
<div class="max-w-6xl mx-auto p-4 md:p-8 ">

    <!-- Container -->

    <div class="bg-white">

        <!-- Header -->
      
        <div id="hide_heading" class="max-w-5xl mx-auto p-6">

            <h2 class="text-xl font-semibold text-gray-800">
                Manage Addresses
            </h2>

        </div>

        <!-- Add Address -->

        <div class="max-w-5xl mx-auto px-8"  id="add_new_address">
            <div class="border p-3 rounded-sm">
                <button
                    class="flex items-center gap-3 text-blue-600 font-semibold hover:text-blue-700 cursor-pointer text-[0.9rem]">

                    <svg  xmlns="http://www.w3.org/2000/svg" width="20" height="20"  
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="M3 13h8v8h2v-8h8v-2h-8V3h-2v8H3z"></path>
                    </svg>

                    ADD A NEW ADDRESS

                </button>
            </div>
        </div>

        {% include 'accounts/addressform.html' %}

        <!-- Address List -->

        <div class=" max-w-5xl mx-auto my-[1.5rem] px-4 md:px-8 space-y-5">

            <!-- Address Card -->
           {% for item in user_address %}
            <div
                class="border rounded-sm hover:shadow-md transition bg-white">

                <div class="p-5">

                    <!-- Top Row -->
                      <div class="flex justify-between w-full">
                         <span class="inline-block px-3 py-1 text-xs font-semibold bg-gray-100 text-gray-600 rounded" id="addressType_{{item.id}}">{{item.address_type}}</span>
                        
                         <div class="group relative">
                            <svg class="cursor-pointer" xmlns="http://www.w3.org/2000/svg" width="24" height="24"  
                                fill="currentColor" viewBox="0 0 24 24" >
                                <!--Boxicons v3.0.8 https://boxicons.com | License  https://docs.boxicons.com/free-->
                                <path d="M12 10a2 2 0 1 0 0 4 2 2 0 1 0 0-4m0 6a2 2 0 1 0 0 4 2 2 0 1 0 0-4m0-12a2 2 0 1 0 0 4 2 2 0 1 0 0-4"></path>
                            </svg>
                           <ul class="shadow-sm bg-white px-4 py-2  h-[max-content] rounded-sm hidden group-hover:block absolute top-0 right-0">
                            <li class="flex justify-center py-1 !text-gray-400 cursor-pointer" onclick="fetchData(event,'{{ item.id }}')">
                                Edit
                            </li>
                            <li class="flex justify-center py-1 !text-gray-400 cursor-pointer"onclick="deleteData('{{item.id}}')">
                                Delete
                            </li>
                           </ul>
                         </div>    

                        </div>
                        <div
                            class="flex items-start justify-between gap-4">

                            <div>

                                

                                <div
                                    class="flex flex-col sm:flex-row sm:items-center gap-2 mt-4">

                                    <h3
                                        class="font-semibold text-lg text-gray-900" id="address_name_{{item.id}}">
                                        {{item.name}}
                                    </h3>

                                    <span
                                        class="font-semibold text-gray-700" id="address_mobile_{{item.id}}">
                                        {{item.mobile}}
                                    </span>

                                </div>

                            </div>

                            <button
                                class="text-gray-500 hover:text-black">

                                <i class="fa-solid fa-ellipsis-vertical text-lg"></i>

                            </button>

                        </div>

                    <!-- Address -->

                    <p
                        class="mt-4 text-gray-700 leading-7" id="address_address_{{item.id}}">

                        {{item.address}}
                        <span class="font-semibold" id="address_pincode_{{item.id}}">
                            {{item.pincode}}
                        </span>

                    </p>

                    
                </div>

            </div>
            {% endfor %}
            <!-- Second Address Example -->

        </div>

    </div>

</div>
