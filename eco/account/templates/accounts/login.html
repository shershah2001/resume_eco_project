{%  extends 'base.html' %}
{% load static %}
{% load widget_tweaks %}
{% block content %}
<form action="{% url 'login' %}" method="POST">
    {% csrf_token %}
    {% for field in form %}
     <label for="{{field.id_for_label}}" class="text-white">{{field.name}}</label>
     {{field|add_class:"text-white"}}
    {% endfor %}
    <button type="submit" class="bg-blue-500 text-white rounded-lg outline-none px-4 py-4">Submit</button>
</form>
{% endblock content %}
