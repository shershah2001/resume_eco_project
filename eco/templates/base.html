<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}
         base
        {% endblock title %}
    </title>
    <link rel="stylesheet" href="{% static '/src/output.css' %}">
    <!-- <link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://kit.fontawesome.com/a2bb067a95.js" crossorigin="anonymous"></script> -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />

    <style>
    .swiper {
      width: 100%;
      height: 100%;
    }

    .swiper-slide {
      text-align: center;
      font-size: 18px;
      /* background: #444; */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper-slide img {
      display: block;
      width: 100%;
      /* height: 100%; */
      object-fit: cover;
    }
    .swiper-button-next, 
    .swiper-button-prev{
        height:3rem;
        color:white;
        background:black;
        padding:1rem;
    }
  

  :root {
  --main-image-width: 500px;
  --main-image-height: 400px;
  --thumbnail-track-width: 90px;
  --thumbnail-height: 79px;
}

* {
  box-sizing: border-box;
}

body {
  background-color: #f5f5f5;
  padding: 20px;
}

.product-image-carousels {
  display: flex;
  justify-content: center;
}

/* Thumbnails Slider */

.thumbnails-slider {
  width: var(--thumbnail-track-width);
  padding: 30px 0;
  margin-right: 5px;
}

.thumbnails-slider button {
  height: 30px;
  width: 100%;
  padding: 0;
  margin: 0;
  font-size: 30px;
  color: rgba(0, 0, 0, 0.7);
}

.thumbnails-slider button:not([disabled]):hover {
  background-color: rgba(0, 0, 0, 0.1);
  color: black;
}

.thumbnails-slider button:focus {
  background-color: royalblue;
}

.thumbnails-slider button:focus .slick-prev-icon,
.thumbnails-slider button:focus .slick-next-icon {
  color: white !important;
}

.thumbnails-slider button.slick-prev {
  top: 15px;
  left: 0;
}

.thumbnails-slider button.slick-prev .slick-prev-icon {
  display: inline-block;
  transform: rotate(90deg);
  color: black;
}

.thumbnails-slider button.slick-next {
  bottom: -15px;
  right: 0;
  top: auto;
}

.thumbnails-slider button.slick-next .slick-next-icon {
  display: inline-block;
  transform: rotate(90deg);
  color: black;
}

.thumbnails-slider .thumbnail-button {
  display: block;
  height: var(--thumbnail-height) !important;
  cursor: pointer;
  border: 0;
  background: none;
  background-color: rgba(0, 0, 0, 0.4);
  transition: opacity 0.1s linear;
}

.thumbnails-slider .thumbnail-button:focus img,
.thumbnails-slider .thumbnail-button:hover img,
.thumbnails-slider .thumbnail-button[aria-current="true"] img {
  opacity: 1;
  filter: grayscale(0);
}

.thumbnails-slider .thumbnail-button:focus img {
  outline: 3px dashed white;
  outline-offset: -4px;
}

.thumbnails-slider .thumbnail-button img {
  display: block;
  width: 100%;
  height: 100%;
  opacity: 0.3;
  object-fit: cover;
  filter: grayscale(0.6);
  transition: all 0.1s linear;
}

/* Main Image Slider */

.main-image-slider {
  position: relative;
  width: var(--main-image-width);
  height: var(--main-image-height);
  margin-bottom: 1px;
}

.main-image-slider button {
  z-index: 1;
}

.main-image-slider button.slick-prev {
  left: 10px;
}

.main-image-slider button.slick-prev .slick-prev-icon {
  opacity: 1;
}

.main-image-slider button.slick-next {
  right: 10px;
}

.main-image-slider button.slick-next .slick-next-icon {
  opacity: 1;
}

.main-image-slider .slick-slide {
  width: var(--main-image-width);
}

.main-image-slider .slick-slide .image-link {
  height: var(--main-image-height);
  overflow: hidden;
  transition: outline 0.1s linear;
}

.main-image-slider .slick-slide .image-link:focus {
  outline: 4px dashed white;
  outline-offset: -7px;
}

.main-image-slider .slick-slide .image-link img {
  display: block;
  object-fit: cover;
  width: 100%;
  height: 100%;
}

/* Note */

.note {
  text-align: center;
  font-size: 14px;
  width: var(--main-image-width);
  padding: 0 20px;
  margin: 0 auto;
  opacity: 0.8;
}

.note a {
  color: black;
  font-weight: bold;
}
</style>

</head>
<body class="relative bg-black">

{% include 'include/navbar.html' %}

{% block content %}

{% endblock content %}
  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- Initialize Swiper -->
    <script>
    var swiper = new Swiper(".mySwiper", {
      autoplay: {
        delay: 2500,
        disableOnInteraction: false,
      },
      loop: true,
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
    });
  </script>
</body>
</html>
