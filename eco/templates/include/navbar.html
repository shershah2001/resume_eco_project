{% include 'include/sidebar.html' %}
<script>

    const navSearchIcon = document.querySelector('#nav_search_icon');
    const searchBar = document.querySelector('.search_bar');
    const crossIcon = document.querySelector('.cross_icon');
    const sideBarClose = document.querySelector(".side_bar_close");
    const hamburgerIcon = document.querySelector(".hamburger_icon");
    const sideBar = document.querySelector(".sidebar");

    navSearchIcon.onclick = () => {
        if (searchBar.classList.contains('-translate-y-full')) {
            searchBar.classList.replace('-translate-y-full', 'translate-y-0');
        } else {
            searchBar.classList.replace('translate-y-0', '-translate-y-full');
        }
    }

    crossIcon.onclick = () => {
        if (searchBar.classList.contains('translate-y-0')) {
            searchBar.classList.replace('translate-y-0', '-translate-y-full')
        }
    }
    hamburgerIcon.onclick = () => {
        sideBar.classList.replace("-translate-x-full", "translate-x-0")

    }
    sideBarClose.onclick = () => {
        sideBar.classList.replace("translate-x-0", "-translate-x-full")

    }


    // logout modal codes start here

    function openLogoutModal() {
        const modal = document.getElementById('logoutModal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeLogoutModal() {
        const modal = document.getElementById('logoutModal');
        modal.classList.remove('flex');
        modal.classList.add('hidden');
    }

    // Close modal when clicking outside
    document.getElementById('logoutModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeLogoutModal();
        }
    });

</script>
